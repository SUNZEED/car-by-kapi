<script>
    const ADMIN_USER = "Kapi";
    const ADMIN_PASS = "worawich0625";
    
    let defaultCars = [
        { id: 1, name: "GTR R35", plate: "RXH 281", category: "ตัวท็อป", imageUrl: "https://images.unsplash.com/photo-1603513360447-73b3eafc1cc5?w=600", isTurbo: true, ownerType: "owner", ownerName: "", status: "available", price: 0, endTime: null }
    ];
    let defaultCategories = ["น้ำมัน", "ไฟฟ้า", "ตัวท็อป", "ประมูล"];
    
    let cars = JSON.parse(localStorage.getItem('summerCars')) || defaultCars;
    let rentalHistory = JSON.parse(localStorage.getItem('summerHistory')) || [];
    let categories = JSON.parse(localStorage.getItem('summerCategories')) || defaultCategories;

    let currentOwnerFilter = 'all'; 
    let currentDashFilter = 'all';

    // อัปเดต Data เก่า
    cars = cars.map(c => ({
        ...c,
        imageUrl: c.imageUrl || '',
        isTurbo: c.isTurbo || false,
        ownerType: c.ownerType || 'owner',
        ownerName: c.ownerName || ''
    }));

    function saveDataLocally() {
        localStorage.setItem('summerCars', JSON.stringify(cars));
        localStorage.setItem('summerHistory', JSON.stringify(rentalHistory));
        localStorage.setItem('summerCategories', JSON.stringify(categories));
    }

    function copyText(event, text, btnElement) {
        if(event) event.stopPropagation();
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btnElement.innerText;
            btnElement.innerText = "✔️";
            setTimeout(() => { btnElement.innerText = originalText; }, 1500);
        });
    }

    function generateShareLink(carId) {
        const url = new URL(window.location.href);
        url.searchParams.set('car', carId);
        return url.href;
    }

    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId + 'Page').classList.add('active');
        
        if (window.event && window.event.target && window.event.target.classList.contains('tab-btn')) {
            window.event.target.classList.add('active');
        }
        
        if(pageId === 'dashboard') updateDashboard();
        if(pageId === 'manage') {
            if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminContent').style.display = 'block';
                renderManageCars();
                renderCategoryManager();
            } else {
                document.getElementById('loginScreen').style.display = 'block';
                document.getElementById('adminContent').style.display = 'none';
            }
        }
    }

    function checkLogin() {
        if (document.getElementById('adminUser').value === ADMIN_USER && document.getElementById('adminPass').value === ADMIN_PASS) {
            sessionStorage.setItem('isAdminLoggedIn', 'true');
            switchPage('manage');
        } else {
            alert("❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!");
        }
    }
    
    function logoutAdmin() {
        sessionStorage.removeItem('isAdminLoggedIn');
        switchPage('cars');
    }

    // --- ระบบจัดการหมวดหมู่ ---
    function renderCategoryDropdowns() {
        let filterHtml = '<option value="all">ทุกหมวดหมู่</option>';
        let addEditHtml = '';
        categories.forEach(c => {
            filterHtml += `<option value="${c}">${c}</option>`;
            addEditHtml += `<option value="${c}">${c}</option>`;
        });
        document.getElementById('categoryFilter').innerHTML = filterHtml;
        document.getElementById('newCarCategory').innerHTML = addEditHtml;
        document.getElementById('editCarCategory').innerHTML = addEditHtml;
    }

    function renderCategoryManager() {
        const catList = document.getElementById('categoryList');
        if(!catList) return;
        catList.innerHTML = '';
        categories.forEach(c => {
            catList.innerHTML += `
                <div class="cat-badge-edit">
                    ${c} 
                    <button class="cat-del-btn" onclick="deleteCategory('${c}')" title="ลบหมวดหมู่นี้">×</button>
                </div>
            `;
        });
    }

    function addCategory() {
        const input = document.getElementById('newCategoryInput');
        const newCat = input.value.trim();
        if(!newCat) return alert("กรุณาพิมพ์ชื่อหมวดหมู่ก่อนครับ!");
        if(categories.includes(newCat)) return alert("หมวดหมู่นี้มีอยู่แล้ว!");
        
        categories.push(newCat);
        saveDataLocally();
        input.value = "";
        renderCategoryManager();
        renderCategoryDropdowns();
        renderCars();
    }

    function deleteCategory(catName) {
        if(confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบหมวดหมู่ "${catName}"?\n(รถที่ใช้หมวดหมู่นี้อยู่จะยังคงอยู่ แต่ไม่สามารถเลือกเพิ่มได้อีก)`)) {
            categories = categories.filter(c => c !== catName);
            saveDataLocally();
            renderCategoryManager();
            renderCategoryDropdowns();
            renderCars();
        }
    }

    // --- Filter หน้าแรก ---
    function setOwnerFilter(filter) {
        currentOwnerFilter = filter;
        document.getElementById('btnFilterAll').classList.remove('active');
        document.getElementById('btnFilterKapi').classList.remove('active');
        document.getElementById('btnFilterOwner').classList.remove('active');
        
        if(filter === 'all') document.getElementById('btnFilterAll').classList.add('active');
        if(filter === 'kapi') document.getElementById('btnFilterKapi').classList.add('active');
        if(filter === 'owner') document.getElementById('btnFilterOwner').classList.add('active');
        renderCars();
    }

    function setDashFilter(filter) {
        currentDashFilter = filter;
        document.getElementById('btnDashFilterAll').classList.remove('active');
        document.getElementById('btnDashFilterKapi').classList.remove('active');
        document.getElementById('btnDashFilterOwner').classList.remove('active');

        if(filter === 'all') document.getElementById('btnDashFilterAll').classList.add('active');
        if(filter === 'kapi') document.getElementById('btnDashFilterKapi').classList.add('active');
        if(filter === 'owner') document.getElementById('btnDashFilterOwner').classList.add('active');

        updateDashboard();
    }

    function renderCars() {
        const grid = document.getElementById('carGrid');
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const catFilter = document.getElementById('categoryFilter').value;
        grid.innerHTML = '';

        const filtered = cars.filter(c => 
            (c.name.toLowerCase().includes(searchTerm) || c.plate.toLowerCase().includes(searchTerm)) &&
            (catFilter === 'all' || c.category === catFilter) &&
            (currentOwnerFilter === 'all' || c.ownerType === currentOwnerFilter)
        );

        filtered.forEach(car => {
            const isBusy = car.status === 'busy';
            const imgUrl = car.imageUrl || 'https://via.placeholder.com/600x400?text=No+Image';
            
            let ownerText = car.ownerType === 'kapi' ? 'รถของกะปิ' : 'รถของเจ้าของ';
            if (car.ownerName && car.ownerName.trim() !== '') {
                ownerText += ` (${car.ownerName})`;
            }

            let html = `
                <div class="car-card ${isBusy ? 'busy' : ''}">
                    <div class="car-image-container">
                        <img src="${imgUrl}" class="car-image" alt="car">
                        ${isBusy ? `<div class="cross-overlay">❌</div>` : ''}
                        <div class="tags-container">
                            ${car.ownerType === 'kapi' ? `<span class="tag-kapi">${ownerText}</span>` : `<span class="tag-owner">${ownerText}</span>`}
                            ${car.isTurbo ? '<span class="tag-turbo">🚀 TURBO</span>' : ''}
                        </div>
                    </div>
                    <div class="car-details">
                        <div class="car-title">
                            ${car.name} <span class="badge">${car.category}</span>
                        </div>
                        <p style="margin: 5px 0; color: #888; font-size: 14px; display: flex; align-items: center;">
                            ทะเบียน: &nbsp;<strong style="color:#fff; letter-spacing: 1px;">${car.plate}</strong>
                            <span class="copy-btn" title="คัดลอกทะเบียน" onclick="copyText(event, '${car.plate}', this)">📑</span>
                            <span class="link-btn" title="คัดลอกลิงก์รถ" onclick="copyText(event, '${generateShareLink(car.id)}', this)">🔗 Link</span>
                        </p>
            `;

            if (isBusy) {
                html += `
                    <div class="rental-info">
                        <span style="color: #FFB300; font-weight: 600;">💰 ยอดเช่า: ${car.price.toLocaleString()} sm</span>
                        <div class="countdown" id="cd-${car.id}" style="margin-top: 10px; font-weight: 600; color:var(--summer-green);">โหลดเวลา...</div>
                    </div></div>`; 
            } else {
                html += `</div>
                    <div class="card-actions">
                        <button class="btn btn-rent" style="flex: 1;" onclick="openRentModal(${car.id})">ลงทะเบียนสัญญา</button>
                    </div>`;
            }
            grid.innerHTML += html;
        });
    }

    // --- ระบบคืนรถอัตโนมัติ (นับถอยหลังทุก 1 วินาที) ---
    setInterval(() => {
        const nowTime = new Date().getTime();
        let stateChanged = false;

        cars.forEach(car => {
            if (car.status === 'busy' && car.endTime) {
                const end = new Date(car.endTime).getTime();
                const diff = end - nowTime;
                const el = document.getElementById(`cd-${car.id}`);

                if (diff <= 0) {
                    // เมื่อหมดเวลา สัญญาจะถูกเคลียร์สถานะเป็นว่างทันที
                    car.status = 'available';
                    car.price = 0;
                    car.endTime = null;
                    stateChanged = true;
                } else {
                    // คำนวณเวลาที่เหลือและแสดงผลบนหน้าจอ
                    if (el) {
                        const hours = Math.floor(diff / (1000 * 60 * 60));
                        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                        const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                        el.innerText = `⏳ เหลือเวลา: ${hours}ชม. ${minutes}นาที ${seconds}วิ.`;
                    }
                }
            }
        });

        if (stateChanged) {
            saveDataLocally();
            renderCars();
            if (sessionStorage.getItem('isAdminLoggedIn') === 'true') {
                renderManageCars();
            }
        }
    }, 1000);

    // --- ระบบทำสัญญาเช่ารถ ---
    function openRentModal(carId) {
        const car = cars.find(c => c.id === carId);
        if(!car) return;
        document.getElementById('rentCarId').value = carId;
        document.getElementById('rentCarName').value = `${car.name} [${car.plate}]`;
        document.getElementById('rentModal').style.display = 'flex';
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
    }

    function confirmRent() {
        const carId = parseInt(document.getElementById('rentCarId').value);
        const endTime = document.getElementById('rentEndTime').value;
        const price = parseFloat(document.getElementById('rentPrice').value) || 0;
        const splitType = document.getElementById('rentSplitType').value;

        if(!endTime) return alert("กรุณาระบุเวลาสิ้นสุดสัญญาเช่าด้วยครับ!");

        const car = cars.find(c => c.id === carId);
        if(car) {
            car.status = 'busy';
            car.price = price;
            car.endTime = endTime;

            // คำนวณส่วนแบ่งรายได้ตามเงื่อนไข
            let kapiShare = 0;
            let ownerShare = 0;

            if (splitType === 'kapi') {
                kapiShare = price;
            } else if (splitType === 'owner') {
                ownerShare = price;
            } else if (splitType === 'split') {
                if (price <= 200000) {
                    ownerShare = price;
                } else {
                    ownerShare = 200000;
                    kapiShare = price - 200000;
                }
            }

            // บันทึกลงในฐานข้อมูลประวัติ
            rentalHistory.push({
                id: Date.now(),
                carId: car.id,
                name: car.name,
                plate: car.plate,
                ownerType: car.ownerType,
                ownerName: car.ownerName,
                price: price,
                kapiShare: kapiShare,
                ownerShare: ownerShare,
                rentDate: new Date().toISOString(),
                endDate: endTime
            });

            saveDataLocally();
            closeModal('rentModal');
            renderCars();
            
            // รีเซ็ตฟอร์ม
            document.getElementById('rentEndTime').value = '';
            document.getElementById('rentPrice').value = '';
        }
    }

    // --- ระบบหลังบ้าน (แอดมิน) ---
    function renderManageCars() {
        const tbody = document.getElementById('manageTableBody');
        if(!tbody) return;
        tbody.innerHTML = '';

        cars.forEach(car => {
            let ownerText = car.ownerType === 'kapi' ? 'กะปิ' : 'เจ้าของ';
            if(car.ownerName) ownerText += ` (${car.ownerName})`;

            tbody.innerHTML += `
                <tr>
                    <td><strong>${car.plate}</strong></td>
                    <td>${car.name} ${car.isTurbo ? '🚀' : ''}</td>
                    <td><span class="badge">${car.category}</span> / ${ownerText}</td>
                    <td>
                        <span style="color: ${car.status === 'busy' ? '#ff4757' : '#00E676'}; font-weight:bold;">
                            ${car.status === 'busy' ? '🔴 ไม่ว่าง' : '🟢 ว่าง'}
                        </span>
                    </td>
                    <td style="text-align: right;">
                        ${car.status === 'busy' ? `<button class="btn btn-return" style="padding: 6px 12px; font-size: 12px; margin-right: 5px;" onclick="forceReturnCar(${car.id})">บังคับคืน</button>` : ''}
                        <button class="btn btn-edit" style="padding: 6px 12px; font-size: 12px;" onclick="openEditModal(${car.id})">แก้ไข</button>
                        <button class="btn btn-delete" style="padding: 6px 12px; font-size: 12px; margin-left: 5px;" onclick="deleteCar(${car.id})">ลบ</button>
                    </td>
                </tr>
            `;
        });
    }

    function addNewCar() {
        const name = document.getElementById('newCarName').value.trim();
        const plate = document.getElementById('newCarPlate').value.trim();
        const category = document.getElementById('newCarCategory').value;
        const imageUrl = document.getElementById('newCarImg').value.trim();
        const ownerType = document.getElementById('newCarOwnerType').value;
        const ownerName = document.getElementById('newCarOwnerName').value.trim();
        const isTurbo = document.getElementById('newCarTurbo').checked;

        if(!name || !plate) return alert("กรุณากรอกชื่อรุ่นและเลขทะเบียนรถก่อนบันทึกครับ!");

        const newCar = {
            id: Date.now(),
            name, plate, category, imageUrl, ownerType, ownerName, isTurbo,
            status: 'available', price: 0, endTime: null
        };

        cars.push(newCar);
        saveDataLocally();
        renderCars();
        renderManageCars();

        // เคลียร์ค่าใน Input
        document.getElementById('newCarName').value = '';
        document.getElementById('newCarPlate').value = '';
        document.getElementById('newCarImg').value = '';
        document.getElementById('newCarOwnerName').value = '';
        document.getElementById('newCarTurbo').checked = false;
    }

    function forceReturnCar(carId) {
        if(confirm("คุณต้องการบังคับคืนรถคันนี้ทันทีใช่หรือไม่? (ล้างสถานะเวลาเช่าปัจจุบัน)")) {
            const car = cars.find(c => c.id === carId);
            if(car) {
                car.status = 'available';
                car.price = 0;
                car.endTime = null;
                saveDataLocally();
                renderCars();
                renderManageCars();
            }
        }
    }

    function openEditModal(carId) {
        const car = cars.find(c => c.id === carId);
        if(!car) return;
        
        document.getElementById('editCarId').value = car.id;
        document.getElementById('editCarName').value = car.name;
        document.getElementById('editCarPlate').value = car.plate;
        document.getElementById('editCarCategory').value = car.category;
        document.getElementById('editCarImg').value = car.imageUrl;
        document.getElementById('editCarOwnerType').value = car.ownerType;
        document.getElementById('editCarOwnerName').value = car.ownerName;
        document.getElementById('editCarTurbo').checked = car.isTurbo;
        
        document.getElementById('editModal').style.display = 'flex';
    }

    function saveEditCar() {
        const id = parseInt(document.getElementById('editCarId').value);
        const car = cars.find(c => c.id === id);
        
        if(car) {
            car.name = document.getElementById('editCarName').value.trim();
            car.plate = document.getElementById('editCarPlate').value.trim();
            car.category = document.getElementById('editCarCategory').value;
            car.imageUrl = document.getElementById('editCarImg').value.trim();
            car.ownerType = document.getElementById('editCarOwnerType').value;
            car.ownerName = document.getElementById('editCarOwnerName').value.trim();
            car.isTurbo = document.getElementById('editCarTurbo').checked;

            saveDataLocally();
            closeModal('editModal');
            renderCars();
            renderManageCars();
        }
    }

    document.getElementById('editModal').addEventListener('click', function(e) {
        if(e.target === this) closeModal('editModal');
    });
    document.getElementById('rentModal').addEventListener('click', function(e) {
        if(e.target === this) closeModal('rentModal');
    });

    function deleteCar(carId) {
        if(confirm("คุณต้องการลบรถคันนี้ออกจากระบบ Summer City อย่างถาวรใช่หรือไม่?")) {
            cars = cars.filter(c => c.id !== carId);
            saveDataLocally();
            renderCars();
            renderManageCars();
        }
    }

    // --- ระบบแดชบอร์ดสรุปรายงานยอดเงิน ---
    function updateDashboard() {
        const weeklyContainer = document.getElementById('weeklyDashboardContainer');
        const overallContainer = document.getElementById('overallDashboardContainer');
        if(!weeklyContainer || !overallContainer) return;

        let totalRevenue = 0;
        let totalKapi = 0;
        let totalOwner = 0;

        rentalHistory.forEach(h => {
            totalRevenue += h.price;
            totalKapi += h.kapiShare || 0;
            totalOwner += h.ownerShare || 0;
        });

        let targetRevenue = totalRevenue;
        if(currentDashFilter === 'kapi') targetRevenue = totalKapi;
        if(currentDashFilter === 'owner') targetRevenue = totalOwner;

        // เรนเดอร์ส่วนสรุปรวมตลอดกาล
        overallContainer.innerHTML = `
            <div class="dashboard-section">
                <h4>📊 สรุปสัดส่วนยอดเงินรวมทั้งหมด</h4>
                <table>
                    <thead>
                        <tr>
                            <th>ประเภทรายได้</th>
                            <th>ยอดเงินสะสม (sm)</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${currentDashFilter === 'all' || currentDashFilter === 'kapi' ? `<tr><td>🥬 ยอดส่วนแบ่งเข้ากะปิ</td><td><strong>${totalKapi.toLocaleString()} sm</strong></td></tr>` : ''}
                        ${currentDashFilter === 'all' || currentDashFilter === 'owner' ? `<tr><td>🏎️ ยอดส่วนแบ่งเข้าเจ้าของรถ</td><td><strong>${totalOwner.toLocaleString()} sm</strong></td></tr>` : ''}
                        <tr class="summary-row">
                            <td>📈 ยอดรวมสุทธิ (ตามตัวกรองปัจจุบัน)</td>
                            <td>${targetRevenue.toLocaleString()} sm</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        `;

        // เรนเดอร์รายการประวัติ
        let historyRows = '';
        rentalHistory.slice().reverse().forEach(h => {
            let showAmount = h.price;
            if(currentDashFilter === 'kapi') showAmount = h.kapiShare;
            if(currentDashFilter === 'owner') showAmount = h.ownerShare;

            const dateFormatted = new Date(h.rentDate).toLocaleString('th-TH', { hour12: false });
            let displayOwner = h.ownerType === 'kapi' ? 'กะปิ' : 'เจ้าของ';
            if(h.ownerName) displayOwner += ` (${h.ownerName})`;

            historyRows += `
                <tr>
                    <td>${dateFormatted}</td>
                    <td><strong>${h.name}</strong> [${h.plate}]</td>
                    <td>${displayOwner}</td>
                    <td style="color:var(--summer-green); font-weight:600;">+ ${showAmount.toLocaleString()} sm</td>
                </tr>
            `;
        });

        weeklyContainer.innerHTML = `
            <div class="dashboard-section">
                <h4>🗒️ บันทึกประวัติการเดินบัญชีเช่ารถ</h4>
                <table>
                    <thead>
                        <tr>
                            <th>วัน-เวลาที่เช่า</th>
                            <th>ข้อมูลรถ</th>
                            <th>ประเภทเจ้าของ</th>
                            <th>ยอดส่วนแบ่งแสดงผล</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${historyRows || '<tr><td colspan="4" style="text-align:center; color:#666;">ยังไม่มีประวัติการเช่าในระบบคลาวด์</td></tr>'}
                    </tbody>
                </table>
            </div>
        `;
    }

    // --- ฟังก์ชันแคปรูปภาพรถว่างอัตโนมัติ ---
    function captureAvailableCars() {
        const target = document.getElementById('screenshotTarget');
        if(!target) return;
        target.innerHTML = '';
        
        // กรองเอาเฉพาะรถที่สถานะว่างตามฟิลเตอร์ประเภทเจ้าของ
        const availableCars = cars.filter(c => c.status === 'available' && (currentOwnerFilter === 'all' || c.ownerType === currentOwnerFilter));
        
        if(availableCars.length === 0) {
            return alert("ในระบบตัวกรองนี้ไม่มีรถคันไหนว่างให้แคปรูปเลยครับ!");
        }

        availableCars.forEach(car => {
            const imgUrl = car.imageUrl || 'https://via.placeholder.com/600x400?text=No+Image';
            target.innerHTML += `
                <div class="ss-card">
                    <img src="${imgUrl}" class="ss-image">
                    <div class="ss-title">${car.name} [${car.plate}] ${car.isTurbo ? '🚀' : ''}</div>
                </div>
            `;
        });

        // ดึง html2canvas ทำงานแปลงอิลิเมนต์นอกจอให้เป็นไฟล์ดาวน์โหลด
        html2canvas(target, { useCORS: true, backgroundColor: "#0B0B0E" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `summer-city-cars-${new Date().toISOString().slice(0,10)}.png`;
            link.href = canvas.toDataURL();
            link.click();
            target.innerHTML = ''; 
        }).catch(err => {
            console.error(err);
            alert("ระบบตรวจพบปัญหาในการเข้าถึงภาพดิบ ลิงก์รูปภาพรถของคุณอาจติด CORS ป้องกันไว้!");
        });
    }

    // --- การทำงานเริ่มแรกเมื่อเปิดหน้าเว็บ ---
    window.onload = function() {
        renderCategoryDropdowns();
        renderCars();

        // ฟังการแชร์ลิงก์ด่วน (Query Parameter ?car=ทะเบียน หรือ ?car=ไอดี)
        const params = new URLSearchParams(window.location.search);
        const carParam = params.get('car');
        if(carParam) {
            const targetCar = cars.find(c => c.id == carParam || c.plate.toLowerCase() === carParam.toLowerCase());
            if(targetCar) {
                document.getElementById('searchInput').value = targetCar.plate;
                renderCars();
            }
        }
    };
</script>
