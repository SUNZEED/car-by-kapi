<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summer City | ปล่อยเช่ารถ (Online)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <!-- [ใส่ Style เดิมของคุณตรงนี้] -->
</head>
<body>
    <!-- [ใส่ HTML เดิมของคุณตรงนี้] -->

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCgjbwVk506Eh4yQDGFict-ioThlsSlomg",
            authDomain: "carname-3bfc2.firebaseapp.com",
            databaseURL: "https://carname-3bfc2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "carname-3bfc2",
            storageBucket: "carname-3bfc2.appspot.com",
            messagingSenderId: "975323167111",
            appId: "1:975323167111:web:8f3f63d1c583ae43493b22"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let cars = [];
        let rentalHistory = [];
        let categories = ["น้ำมัน", "ไฟฟ้า", "ตัวท็อป", "ประมูล"];

        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.summerCars) {
                cars = Object.values(data.summerCars);
                rentalHistory = data.summerHistory ? Object.values(data.summerHistory) : [];
                categories = data.summerCategories || ["น้ำมัน", "ไฟฟ้า", "ตัวท็อป", "ประมูล"];
                renderCars();
                renderManageCars();
            } else {
                // ถ้าข้อมูลว่าง ให้เขียนค่าเริ่มต้นลงไป
                saveDataLocally();
            }
        });

        function saveDataLocally() {
            db.ref('/').set({
                summerCars: [{ id: 1, name: "GTR R35", plate: "2DCOREY", category: "ตัวท็อป", imageUrl: "", isTurbo: false, ownerType: "owner", ownerName: "", status: "available", price: 0, endTime: null }],
                summerHistory: [],
                summerCategories: categories
            });
        }

        // [ใส่ฟังก์ชันที่เหลือของคุณไว้ที่นี่ ต่อจากบรรทัดนี้]
        // อย่าลืมเอาฟังก์ชัน renderCars, renderManageCars, openRentModal ฯลฯ มาวางต่อตรงนี้ให้ครบนะครับ
    </script>
</body>
</html>
